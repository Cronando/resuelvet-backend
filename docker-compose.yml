services:
  db:
    image: postgres:16-alpine
    container_name: resuelvet-db
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resuelvet_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./resuelvet-db.sql:/docker-entrypoint-initdb.d/01-resuelvet-db.sql:ro
      - ./resuelvet-inserts.sql:/docker-entrypoint-initdb.d/02-resuelvet-inserts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resuelvet_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resuelvet-api
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
